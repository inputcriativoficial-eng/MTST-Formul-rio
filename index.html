<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTST - Controle na Nuvem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e31b23">

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Estilos baseados no seu original com melhorias para mobile */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f0f0; padding-bottom: 80px; }
        header { background: #1a1a1a; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #e31b23; font-weight: bold; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background: #e31b23; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .btn-secundario { background: #555; }
        .item-lista { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .tab-content { display: none; }
        .active { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; border-top: 3px solid #e31b23; }
        nav div { flex: 1; color: white; text-align: center; padding: 15px 5px; font-size: 12px; cursor: pointer; }
        #camera-container { width: 100%; max-width: 400px; margin: auto; display: none; position: relative; }
        #canvas { width: 100%; border-radius: 8px; transform: scaleX(-1); }
        .status-nuvem { font-size: 10px; text-align: center; padding: 5px; background: #eee; color: #666; }
    </style>
</head>
<body>

<header>SISTEMA DE CONTROLE - MTST</header>
<div class="status-nuvem" id="status-sync">Sincronizando com a nuvem...</div>

<div class="container">
    <div id="aba-membros" class="tab-content active">
        <div class="card">
            <h3>Cadastrar Novo Membro</h3>
            <input type="text" id="nome-membro" placeholder="Nome Completo">
            <input type="text" id="id-membro" placeholder="ID ou CPF (Opcional)">
            <button onclick="cadastrarMembro()">CADASTRAR</button>
        </div>
        <div class="card">
            <input type="text" id="busca" placeholder="🔍 Buscar membro..." onkeyup="filtrarMembros()">
            <div id="lista-membros"></div>
        </div>
    </div>

    <div id="aba-presenca" class="tab-content">
        <div class="card">
            <h3>Registrar Presença</h3>
            <button onclick="abrirCamera()">📷 ESCANEAR QR CODE</button>
            <div id="camera-container">
                <canvas id="canvas"></canvas>
                <button class="btn-secundario" onclick="fecharCamera()">FECHAR CÂMERA</button>
            </div>
            <select id="selecionar-evento"></select>
            <div id="presenca-manual">
                <p style="margin-top: 10px; font-size: 14px;">Ou selecione na lista de membros abaixo.</p>
            </div>
        </div>
    </div>

    <div id="aba-config" class="tab-content">
        <div class="card">
            <h3>Configurações</h3>
            <button class="btn-secundario" onclick="exportarExcel()">BAIXAR RELATÓRIO (CSV)</button>
            <button style="background:#000; margin-top: 20px;" onclick="window.location.reload()">ATUALIZAR APP</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="mudarAba('aba-membros')">MEMBROS</div>
    <div onclick="mudarAba('aba-presenca')">PRESENÇA</div>
    <div onclick="mudarAba('aba-config')">AJUSTES</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ATENÇÃO: COLE AS SUAS CONFIGURAÇÕES DO FIREBASE AQUI ABAIXO
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'mtst_dados');

    let dadosLocais = { membros: {}, presencas: {} };

    // SINCRONIZAÇÃO EM TEMPO REAL
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            dadosLocais = data;
            document.getElementById('status-sync').innerText = "✅ Sincronizado";
            document.getElementById('status-sync').style.color = "green";
            atualizarTela();
        }
    });

    // FUNÇÕES GLOBAIS
    window.cadastrarMembro = () => {
        const nome = document.getElementById('nome-membro').value.trim();
        if(!nome) return alert("Digite o nome");
        
        const novoId = Date.now(); // ID único baseado no tempo
        set(ref(db, 'mtst_dados/membros/' + novoId), {
            id: novoId,
            nome: nome,
            cadastro: new Date().toLocaleDateString()
        });
        document.getElementById('nome-membro').value = "";
        alert("Cadastrado na nuvem!");
    };

    window.marcarPresenca = (membroId) => {
        const hoje = new Date().toISOString().split('T')[0];
        set(ref(db, `mtst_dados/presencas/${hoje}/${membroId}`), {
            horario: new Date().toLocaleTimeString(),
            status: "Presente"
        });
        alert("Presença registrada!");
    };

    function atualizarTela() {
        const lista = document.getElementById('lista-membros');
        lista.innerHTML = "";
        
        if(dadosLocais.membros) {
            Object.values(dadosLocais.membros).forEach(m => {
                const div = document.createElement('div');
                div.className = 'item-lista';
                div.innerHTML = `
                    <span>${m.nome}</span>
                    <button style="width:auto; padding:5px 10px;" onclick="marcarPresenca('${m.id}')">Presença</button>
                `;
                lista.appendChild(div);
            });
        }
    }

    // Navegação simples
    window.mudarAba = (id) => {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>

<script>
    // Lógica da Câmera (mantida do seu original)
    let video = document.createElement("video");
    let canvasElement = document.getElementById("canvas");
    let canvas = canvasElement.getContext("2d");

    function abrirCamera() {
        document.getElementById('camera-container').style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });
    }

    function fecharCamera() {
        video.srcObject.getTracks().forEach(track => track.stop());
        document.getElementById('camera-container').style.display = 'none';
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                // Ao ler o QR Code, extrai o ID e marca presença
                window.marcarPresenca(code.data);
                fecharCamera();
            }
        }
        requestAnimationFrame(tick);
    }
</script>

</body>
</html>

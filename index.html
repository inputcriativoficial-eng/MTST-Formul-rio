<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTST - Sistema de Controle</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* MANTIVE TODO O SEU ESTILO ORIGINAL ABAIXO */
        :root { --red: #e31b23; --dark: #1a1a1a; --gray: #f4f4f4; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); padding-bottom: 80px; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--red); position: sticky; top: 0; z-index: 100; font-weight: bold; }
        .status-nuvem { font-size: 11px; text-align: center; padding: 5px; background: #eee; color: #666; font-weight: bold; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); margin-bottom: 15px; font-size: 1.2rem; border-left: 4px solid var(--red); padding-left: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .membro-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #ddd; position: relative; }
        .membro-info { flex: 1; }
        .membro-info h3 { font-size: 16px; text-transform: uppercase; color: var(--dark); }
        .qr-area { width: 70px; height: 70px; margin-left: 10px; }
        .btn-excluir { position: absolute; top: 5px; right: 5px; background: #000; color: #fff; border: none; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; cursor: pointer; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--dark); display: flex; border-top: 3px solid var(--red); }
        .nav-item { flex: 1; padding: 15px; color: #888; text-align: center; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: white; background: #222; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<header>SISTEMA DE CONTROLE - MTST</header>
<div class="status-nuvem" id="sync-status">🔄 Conectando à Nuvem...</div>

<div class="container">
    
    <div id="aba-membros" class="section active">
        <div class="card">
            <h2>Cadastrar Novo Membro</h2>
            <input type="text" id="nome-membro" placeholder="Nome Completo">
            <input type="text" id="setor-membro" placeholder="Setor / Ocupação">
            <button onclick="salvarNoFirebase()">CADASTRAR E SALVAR NA NUVEM</button>
        </div>

        <input type="text" id="busca" placeholder="🔍 Buscar membro..." onkeyup="filtrar()">
        <div id="lista-membros"></div>
    </div>

    <div id="aba-scan" class="section">
        <div class="card">
            <h2>Leitor de Presença</h2>
            <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden;"></div>
            <div id="scanned-result" style="margin-top: 15px; padding: 10px; text-align: center; border-radius: 8px;"></div>
        </div>
    </div>

</div>

<nav>
    <div class="nav-item active" onclick="mudarAba('aba-membros', this)">MEMBROS</div>
    <div class="nav-item" onclick="mudarAba('aba-scan', this)">SCANNER</div>
</nav>

<script type="module">
    // IMPORTANDO O MOTOR DO GOOGLE FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // SUAS CONFIGURAÇÕES DO BANCO DE DADOS
    const firebaseConfig = {
        apiKey: "AIzaSyDpApwCKpVyLzbWee_-7oXpEZYYLDvg7JU",
        authDomain: "mtst-controle.firebaseapp.com",
        databaseURL: "https://mtst-controle-default-rtdb.firebaseio.com",
        projectId: "mtst-controle",
        storageBucket: "mtst-controle.firebasestorage.app",
        messagingSenderId: "101701970728",
        appId: "1:101701970728:web:065d8ddd116b42e87b3e1d"
    };

    // INICIALIZANDO
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let dadosMembros = {};

    // ESCUTAR O BANCO DE DADOS (ATUALIZA SOZINHO)
    onValue(ref(db, 'membros'), (snapshot) => {
        dadosMembros = snapshot.val() || {};
        document.getElementById('sync-status').innerText = "✅ NUVEM ATIVA - DADOS SINCRONIZADOS";
        document.getElementById('sync-status').style.color = "green";
        listarMembros();
    });

    // FUNÇÃO PARA SALVAR NO FIREBASE
    window.salvarNoFirebase = () => {
        const nome = document.getElementById('nome-membro').value;
        const setor = document.getElementById('setor-membro').value;
        
        if(!nome) return alert("Por favor, digite o nome.");

        const idUnico = "ID-" + Date.now();
        
        set(ref(db, 'membros/' + idUnico), {
            id: idUnico,
            nome: nome,
            setor: setor || "Geral",
            data: new Date().toLocaleDateString()
        }).then(() => {
            document.getElementById('nome-membro').value = "";
            document.getElementById('setor-membro').value = "";
        });
    };

    // FUNÇÃO PARA EXCLUIR
    window.excluirMembro = (id) => {
        if(confirm("Deseja remover este membro da nuvem?")) {
            remove(ref(db, 'membros/' + id));
        }
    };

    // LISTAR OS MEMBROS COM O SEU LAYOUT
    function listarMembros(filtro = "") {
        const lista = document.getElementById('lista-membros');
        lista.innerHTML = "";

        Object.values(dadosMembros).reverse().forEach(m => {
            if(m.nome.toLowerCase().includes(filtro.toLowerCase())) {
                const item = document.createElement('div');
                item.className = 'membro-item';
                item.innerHTML = `
                    <button class="btn-excluir" onclick="excluirMembro('${m.id}')">X</button>
                    <div class="membro-info">
                        <h3>${m.nome}</h3>
                        <p>Setor: ${m.setor}</p>
                        <p style="font-size: 10px; color: #999;">${m.id}</p>
                    </div>
                    <div id="qr-${m.id}" class="qr-area"></div>
                `;
                lista.appendChild(item);
                new QRCode(document.getElementById(`qr-${m.id}`), {
                    text: m.id,
                    width: 70,
                    height: 70
                });
            }
        });
    }

    window.filtrar = () => {
        listarMembros(document.getElementById('busca').value);
    };

    // SISTEMA DE PRESENÇA (SCANNER)
    window.processarLeitura = (idLido) => {
        const m = dadosMembros[idLido];
        const res = document.getElementById('scanned-result');
        if(m) {
            res.innerHTML = `<h3>✅ PRESENÇA CONFIRMADA</h3><p>${m.nome}</p>`;
            res.style.background = "#d4edda";
            res.style.color = "#155724";
        } else {
            res.innerHTML = `<h3>❌ NÃO ENCONTRADO</h3><p>ID Inválido</p>`;
            res.style.background = "#f8d7da";
            res.style.color = "#721c24";
        }
    };
</script>

<script>
    // CONTROLE DE ABAS E CÂMERA
    let html5QrCode;

    function mudarAba(id, elemento) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        elemento.classList.add('active');

        if(id === 'aba-scan') {
            ligarCamera();
        } else {
            if(html5QrCode) html5QrCode.stop();
        }
    }

    function ligarCamera() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            qrCodeMessage => { window.processarLeitura(qrCodeMessage); }
        ).catch(err => console.error(err));
    }
</script>

</body>
</html>
